<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 2: useState + useEffect</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- React and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Registration Form Component (Previous Code + Submit Functionality)
        function RegisterForm() {
            // useState hooks for form fields (from Demo 1)
            const [name, setName] = useState('');
            const [age, setAge] = useState('');
            const [password, setPassword] = useState('');
            const [message, setMessage] = useState('');

            // Submit handler with API call
            const handleSubmit = async (e) => {
                e.preventDefault();

                try {
                    const response = await fetch('./api-data.json');
                    const data = await response.json();
                    
                    setMessage('User registered successfully!');
                    
                    // Clear form
                    setName('');
                    setAge('');
                    setPassword('');
                } catch (error) {
                    setMessage('Failed to register user');
                }
            };

            return (
                <div className="container mt-5">
                    <div className="card">
                        <div className="card-header">
                            <h3>Demo 2: Registration + Submit (useEffect)</h3>
                        </div>
                        <div className="card-body">
                            <form onSubmit={handleSubmit}>
                                <div className="mb-3">
                                    <label>Name:</label>
                                    <input 
                                        type="text" 
                                        className="form-control"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                    />
                                </div>
                                
                                <div className="mb-3">
                                    <label>Age:</label>
                                    <input 
                                        type="number" 
                                        className="form-control"
                                        value={age}
                                        onChange={(e) => setAge(e.target.value)}
                                    />
                                </div>

                                <div className="mb-3">
                                    <label>Password:</label>
                                    <input 
                                        type="password" 
                                        className="form-control"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                    />
                                </div>

                                <button type="submit" className="btn btn-primary">
                                    Register
                                </button>
                            </form>

                            {message && (
                                <div className="alert alert-info mt-3">
                                    {message}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app using React 18 createRoot
        const { createRoot } = ReactDOM;
        const root = createRoot(document.getElementById('root'));
        root.render(<RegisterForm />);
    </script>
</body>
</html>
