<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 5: Complete App with useEffect API Calls</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- React, ReactDOM, React Router and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext } = React;
        const { BrowserRouter, Switch, Route, Link, useHistory, Redirect } = ReactRouterDOM;

        // NEW: Auth Context (Global State Management)
        const AuthContext = createContext();

        // NEW: Auth Provider Component
        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            const login = (userData) => {
                setUser(userData);
                setIsLoggedIn(true);
            };

            const logout = () => {
                setUser(null);
                setIsLoggedIn(false);
            };

            return (
                <AuthContext.Provider value={{ user, isLoggedIn, login, logout }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        // Registration Component (All Previous Code from Demo 3)
        function RegisterPage() {
            const [name, setName] = useState('');
            const [age, setAge] = useState('');
            const [password, setPassword] = useState('');
            const [message, setMessage] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();

                try {
                    const response = await fetch('./api-data.json');
                    const data = await response.json();
                    
                    setMessage('User registered successfully! You can now sign in.');
                    setName('');
                    setAge('');
                    setPassword('');
                } catch (error) {
                    setMessage('Failed to register user');
                }
            };

            return (
                <div className="container mt-5">
                    <div className="card">
                        <div className="card-header">
                            <h3>Register Page</h3>
                        </div>
                        <div className="card-body">
                            <form onSubmit={handleSubmit}>
                                <div className="mb-3">
                                    <label>Name:</label>
                                    <input 
                                        type="text" 
                                        className="form-control"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                    />
                                </div>
                                
                                <div className="mb-3">
                                    <label>Age:</label>
                                    <input 
                                        type="number" 
                                        className="form-control"
                                        value={age}
                                        onChange={(e) => setAge(e.target.value)}
                                    />
                                </div>

                                <div className="mb-3">
                                    <label>Password:</label>
                                    <input 
                                        type="password" 
                                        className="form-control"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                    />
                                </div>

                                <button type="submit" className="btn btn-primary">
                                    Register
                                </button>
                            </form>

                            {message && (
                                <div className="alert alert-info mt-3">
                                    {message}
                                </div>
                            )}

                            <div className="mt-3">
                                <p>Already have account?</p>
                                <Link to="/signin" className="btn btn-outline-success">
                                    Sign In
                                </Link>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // UPDATED: Sign In Component with Context Integration
        function SignInPage() {
            const [name, setName] = useState('');
            const [password, setPassword] = useState('');
            const [message, setMessage] = useState('');
            const { login } = useContext(AuthContext);
            const history = useHistory();

            const handleSignIn = async (e) => {
                e.preventDefault();
                
                try {
                    const response = await fetch('./api-data.json');
                    const data = await response.json();
                    
                    if (name && password) {
                        login({ name: name });
                        history.push('/dashboard');
                    } else {
                        setMessage('Please enter name and password');
                    }
                } catch (error) {
                    setMessage('Login failed');
                }
            };

            return (
                <div className="container mt-5">
                    <div className="card">
                        <div className="card-header">
                            <h3>Sign In Page</h3>
                        </div>
                        <div className="card-body">
                            <form onSubmit={handleSignIn}>
                                <div className="mb-3">
                                    <label>Name:</label>
                                    <input 
                                        type="text" 
                                        className="form-control"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                    />
                                </div>

                                <div className="mb-3">
                                    <label>Password:</label>
                                    <input 
                                        type="password" 
                                        className="form-control"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                    />
                                </div>

                                <button type="submit" className="btn btn-success">
                                    Sign In
                                </button>
                            </form>

                            {message && (
                                <div className="alert alert-info mt-3">
                                    {message}
                                </div>
                            )}

                            <div className="mt-3">
                                <p>Don't have account?</p>
                                <Link to="/register" className="btn btn-outline-primary">
                                    Register
                                </Link>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // NEW: Dashboard Component with useEffect API calls
        function Dashboard() {
            const { user } = useContext(AuthContext);
            const [todo, setTodo] = useState('Loading todo...');

            // useEffect to fetch data when component mounts
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('https://jsonplaceholder.typicode.com/todos/1');
                        const data = await response.json();
                        setTodo(`Todo: ${data.title}`);
                    } catch (error) {
                        setTodo('Failed to load todo');
                    }
                };

                fetchData();
            }, []);

            return (
                <div className="container mt-5">
                    <div className="card">
                        <div className="card-header">
                            <h2>Dashboard</h2>
                        </div>
                        <div className="card-body text-center">
                            <h1>Hello {user?.name}</h1>
                            <p className="mt-4">{todo}</p>
                        </div>
                    </div>
                </div>
            );
        }

        // UPDATED: Navigation Component with Auth Status
        function Navigation() {
            const { isLoggedIn, user, logout } = useContext(AuthContext);
            const history = useHistory();
            
            const handleLogout = () => {
                logout();
                history.push('/signin');
            };
            
            return (
                <nav className="navbar navbar-dark bg-dark">
                    <div className="container">
                        <span className="navbar-brand">Demo 5: API Dashboard</span>
                        
                        <div className="d-flex align-items-center">
                            <div className={`badge ${isLoggedIn ? 'bg-success' : 'bg-danger'} me-3`}>
                                {isLoggedIn ? `🟢 Logged In as ${user?.name}` : '🔴 Not Logged In'}
                            </div>
                            
                            <div>
                                {!isLoggedIn ? (
                                    <>
                                        <Link className="btn btn-outline-light me-2" to="/register">Register</Link>
                                        <Link className="btn btn-outline-light" to="/signin">Sign In</Link>
                                    </>
                                ) : (
                                    <>
                                        <Link className="btn btn-outline-light me-2" to="/dashboard">Dashboard</Link>
                                        <button className="btn btn-outline-light" onClick={handleLogout}>
                                            Logout
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            );
        }

        // UPDATED: Main App Component with All Features
        function App() {
            return (
                <BrowserRouter>
                    <AuthProvider>
                        <Navigation />
                        <Switch>
                            <Route exact path="/" component={RegisterPage} />
                            <Route exact path="/register" component={RegisterPage} />
                            <Route exact path="/signin" component={SignInPage} />
                            <Route exact path="/dashboard" component={Dashboard} />
                        </Switch>
                    </AuthProvider>
                </BrowserRouter>
            );
        }

        // Render the app using React 18 createRoot
        const { createRoot } = ReactDOM;
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
