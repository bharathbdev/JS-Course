<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo 3: useState + useEffect + Router</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- React, ReactDOM, React Router and Babel -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { BrowserRouter, Switch, Route, Link, useHistory } = ReactRouterDOM;

      // Registration Component (All Previous Code from Demo 2)
      function RegisterPage() {
        const [name, setName] = useState("");
        const [age, setAge] = useState("");
        const [password, setPassword] = useState("");
        const [message, setMessage] = useState("");

        const handleSubmit = (e) => {
          e.preventDefault();

          fetch("http://localhost:3000/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: name,
              password: password,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              setMessage("Success: " + data.message);
              // Clear form
              setName("");
              setAge("");
              setPassword("");
            })
            .catch((error) => {
              setMessage("Error: Something went wrong");
            });
        };

        return (
          <div className="container mt-5">
            <div className="card">
              <div className="card-header">
                <h3>Register Page</h3>
              </div>
              <div className="card-body">
                <form onSubmit={handleSubmit}>
                  <div className="mb-3">
                    <label>Name:</label>
                    <input
                      type="text"
                      className="form-control"
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                    />
                  </div>

                  <div className="mb-3">
                    <label>Age:</label>
                    <input
                      type="number"
                      className="form-control"
                      value={age}
                      onChange={(e) => setAge(e.target.value)}
                    />
                  </div>

                  <div className="mb-3">
                    <label>Password:</label>
                    <input
                      type="password"
                      className="form-control"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                    />
                  </div>

                  <button type="submit" className="btn btn-primary">
                    Register
                  </button>
                </form>

                {message && (
                  <div className="alert alert-info mt-3">{message}</div>
                )}

                <div className="mt-3">
                  <p>Already have account?</p>
                  <Link to="/signin" className="btn btn-outline-success">
                    Sign In
                  </Link>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // NEW: Sign In Component
      function SignInPage() {
        const [name, setName] = useState("");
        const [password, setPassword] = useState("");
        const [message, setMessage] = useState("");
        const history = useHistory();

        const handleSignIn = (e) => {
          e.preventDefault();

          fetch("http://localhost:3000/signin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: name,
              password: password,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              setName("");
              setPassword("");

              if (data.message === "Invalid credentials") {
                setMessage("Sign in failed");
                return;
              }
              history.push("/dashboard");
            })
            .catch((error) => {
              setMessage("Sign in failed");
            });
        };

        return (
          <div className="container mt-5">
            <div className="card">
              <div className="card-header">
                <h3>Sign In Page</h3>
              </div>
              <div className="card-body">
                <form onSubmit={handleSignIn}>
                  <div className="mb-3">
                    <label>Name:</label>
                    <input
                      type="text"
                      className="form-control"
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                    />
                  </div>

                  <div className="mb-3">
                    <label>Password:</label>
                    <input
                      type="password"
                      className="form-control"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                    />
                  </div>

                  <button type="submit" className="btn btn-success">
                    Sign In
                  </button>
                </form>

                {message && (
                  <div className="alert alert-info mt-3">{message}</div>
                )}

                <div className="mt-3">
                  <p>Don't have account?</p>
                  <Link to="/register" className="btn btn-outline-primary">
                    Register
                  </Link>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Dashboard Component
      function DashboardPage() {
        return (
          <div className="container mt-5">
            <div className="card">
              <div className="card-header">
                <h3>Dashboard</h3>
              </div>
              <div className="card-body">
                <p>Welcome! You are now signed in.</p>
              </div>
            </div>
          </div>
        );
      }

      // Navigation Component
      function Navigation() {
        return (
          <nav className="navbar navbar-dark bg-dark">
            <div className="container">
              <span className="navbar-brand">Demo 3: Router</span>
              <div>
                <Link className="btn btn-outline-light me-2" to="/register">
                  Register
                </Link>
                <Link className="btn btn-outline-light" to="/signin">
                  Sign In
                </Link>
              </div>
            </div>
          </nav>
        );
      }

      // Main App Component with Router
      function App() {
        return (
          <BrowserRouter>
            <Navigation />
            <Switch>
              <Route exact path="/" component={RegisterPage} />
              <Route exact path="/register" component={RegisterPage} />
              <Route exact path="/signin" component={SignInPage} />
              <Route exact path="/dashboard" component={DashboardPage} />
            </Switch>
          </BrowserRouter>
        );
      }

      // Render the app using React 18 createRoot
      const { createRoot } = ReactDOM;
      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
